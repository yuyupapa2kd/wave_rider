services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cpb_bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cpb_bot_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cpb_bot}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_HOST: db
      POSTGRES_USER: ${POSTGRES_USER:-cpb_bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cpb_bot_password}
      RAILS_ENV: development
      TZ: Asia/Seoul
    command: ./bin/rails server -b 0.0.0.0 -p 3000
    volumes:
      - .:/rails
      - bundle-cache:/usr/local/bundle
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  jobs:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_HOST: db
      POSTGRES_USER: ${POSTGRES_USER:-cpb_bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cpb_bot_password}
      RAILS_ENV: development
      TZ: Asia/Seoul
    command: ./bin/jobs
    volumes:
      - .:/rails
      - bundle-cache:/usr/local/bundle
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres-data:
  bundle-cache:
